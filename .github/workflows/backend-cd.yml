name: Backend CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 30m
        script: |
          set -e
          
          # 设置 Maven 环境变量，在服务器上执行`which mvn`命令获取
          export MAVEN_HOME=/opt/apache-maven-3.9.9
          export PATH=$MAVEN_HOME/bin:$PATH
          
          echo "========== 开始部署 =========="
          
          # 1. 切换到项目目录
          cd /root/myapp/ai/ai-overview/backend
          echo "当前目录: $(pwd)"
          
          # 2. 拉取最新代码
          echo "========== 拉取代码 =========="
          git pull
          
          # 3. 打包项目
          echo "========== Maven 打包 =========="
          mvn clean package -DskipTests
          
          # 4. 重新构建并启动
          echo "========== Docker 构建部署 =========="
          make docker-compose-up-build
          
          echo "========== 部署完成 =========="
    
    - name: Verify deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # 等待服务启动
          sleep 10
          
          # 健康检查
          curl --retry 10 --retry-delay 5 --retry-max-time 60 http://localhost:8090/actuator/health || {
            echo "健康检查失败，查看服务日志..."
            docker logs ai-overview-backend --tail 50
            exit 1
          }
          
          echo "✅ 部署验证成功！"
