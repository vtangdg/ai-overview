<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#mainGradient)" stroke-width="3"/>

  <!-- Inner hexagon pattern -->
  <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" fill="none" stroke="url(#mainGradient)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="6" fill="url(#mainGradient)"/>

  <!-- Small accent dots -->
  <circle cx="32" cy="16" r="2" fill="#0EA5E9"/>
  <circle cx="46" cy="32" r="2" fill="#8B5CF6"/>
  <circle cx="32" cy="48" r="2" fill="#0EA5E9"/>
  <circle cx="18" cy="32" r="2" fill="#8B5CF6"/>
</svg>